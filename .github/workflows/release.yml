name: Release Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install

      - name: Import code signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "actions" "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Build release
        run: bun run build:release
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}

      - name: Find build artifacts
        run: |
          APP_PATH=$(find build -maxdepth 2 -name "*.app" -type d | head -1)
          DMG_PATH=$(find artifacts -name "*.dmg" | head -1)
          if [[ -z "$APP_PATH" ]]; then
            echo "ERROR: No .app bundle found in build/"
            exit 1
          fi
          if [[ -z "$DMG_PATH" ]]; then
            echo "ERROR: No .dmg found in artifacts/"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "Found app: $APP_PATH"
          echo "Found dmg: $DMG_PATH"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$APP_PATH" "$APP_PATH.zip"
          xcrun notarytool submit "$APP_PATH.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          rm "$APP_PATH.zip"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          cp "$DMG_PATH" Tempest.dmg

      - name: Create distributable zip
        run: ditto -c -k --keepParent "$APP_PATH" Tempest.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Tempest
          path: |
            Tempest.dmg
            Tempest.zip

      - name: Extract changelog for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" Tempest.dmg Tempest.zip \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release_notes.md

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA256=$(shasum -a 256 Tempest.dmg | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${{ github.repository_owner }}/homebrew-recipes.git" homebrew-tap
          cd homebrew-tap

          cat > Casks/tempest.rb << CASK
          cask "tempest" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/v#{version}/Tempest.dmg"
            name "Tempest"
            desc "macOS developer tool for AI-assisted coding"
            homepage "https://gotempest.net"

            depends_on macos: ">= :ventura"

            app "Tempest.app"

            zap trash: [
              "~/Library/Application Support/com.tempest.app",
              "~/Library/Preferences/com.tempest.app.plist",
              "~/Library/Caches/com.tempest.app",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tempest.rb
          git commit -m "Update Tempest to ${VERSION}"
          git push
